<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Hub</title>
</head>
<body>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <p id="result"></p>

    <hr>

    <button onclick="getProfile()">
        Get Profile
    </button>

    <div id="profile"></div>

    <hr>

    <button onclick="getNotes()">
        Load Notes
    </button>

    <div id="notes"></div>

    <hr>

    <h3>Create Note</h3>

    <input
        type="text"
        id="title"
        placeholder="Title"
    >

    <textarea
        id="content"
        placeholder="Content"
    ></textarea>

    <input
        type="text"
        id="tags"
        placeholder="Tags"
    >

    <button onclick="createNote()">
        Create Note
    </button>
<script src="script.js"></script>

</body>
</html>
